services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: breathe_esg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d breathe_esg"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./breathe-esg-be
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: docker-dev-secret-change-for-production
      DEBUG: "True"
      DATABASE_URL: postgres://postgres:postgres@db:5432/breathe_esg
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./breathe-esg-fe
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
